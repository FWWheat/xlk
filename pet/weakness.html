<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>属性克制</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="public/leologo/leo_favicon.png" type="image/png">
  <link rel="shortcut icon" href="public/leologo/leo_favicon.png" type="image/png">
</head>
<body>

<div class="top-bar">
  <h1>洛克王国：世界 属性克制</h1>
  <div class="top-menu">
    <button class="top-menu-btn" onclick="location.href='index.html'">
      <img src="public/leologo/pet_icon.png" class="menu-icon" alt="pets">
      宠物图鉴
    </button>
    <button class="top-menu-btn" onclick="location.href='skills.html'">
      <img src="public/leologo/element_icon.png" class="menu-icon" alt="skills">
      技能图鉴
    </button>
    <button class="top-menu-btn active" onclick="location.href='weakness.html'">
      <img src="public/leologo/element_icon.png" class="menu-icon" alt="weakness">
      属性克制
    </button>
  </div>
</div>

<div class="page-container">
  <div class="weakness-layout">
    <div class="weakness-left">
      <div class="mode-bar">
        <button class="mode-btn active" data-mode="atk">攻击方</button>
        <button class="mode-btn" data-mode="def">防守方</button>
      </div>

      <div>
        <h4>选择属性</h4>
        <div id="elemList"></div>
      </div>
    </div>

    <div class="weakness-right">
      <div class="legend">
        <div class="legend-item">
          <span class="line very"></span>
          <span>克制</span>
        </div>
        <div class="legend-item">
          <span class="line not"></span>
          <span>抵抗</span>
        </div>
      </div>
      <div class="circle-wrap" id="circleWrap">
        <div class="circle-center" id="centerElem"></div>
      </div>
    </div>
  </div>
</div>

<script src="data/config.js"></script>
<script>
const modeBtns = document.querySelectorAll(".mode-btn");
const elemList = document.getElementById("elemList");
const circleWrap = document.getElementById("circleWrap");
const centerElem = document.getElementById("centerElem");

let currentMode = "atk";
let selectedAtk = null;
let selectedDef = [];

const elements = allElements.filter(e => e !== "全部");

elements.forEach(element => {
  const button = document.createElement("button");
  button.className = "filter-btn";
  button.textContent = element;
  button.dataset.elem = element;
  button.style.backgroundColor = "#2a2a2e";
  button.style.color = elementColors[element];
  button.style.border = `2px solid ${elementColors[element]}`;
  button.style.fontSize = "14px";
  button.style.margin = "4px";
  elemList.appendChild(button);

  button.onclick = () => {
    if (currentMode === "atk") {
      if (selectedAtk === element) {
        selectedAtk = null;
        selectedDef = [];
        button.classList.remove("active");
        showCenter([]);
        clearArrows();
      } else {
        document.querySelectorAll(".filter-btn").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        selectedAtk = element;
        selectedDef = [];
        showCenter([element]);
        drawAtkArrows(element);
      }
    } else {
      if (selectedDef.includes(element)) {
        selectedDef = selectedDef.filter(item => item !== element);
        button.classList.remove("active");
      } else {
        if (selectedDef.length >= 2) return;
        selectedDef.push(element);
        button.classList.add("active");
      }

      selectedAtk = null;
      document.querySelectorAll(".filter-btn").forEach(item => {
        if (!selectedDef.includes(item.dataset.elem)) item.classList.remove("active");
      });
      showCenter(selectedDef);
      drawDefArrows(selectedDef);
    }
  };
});

modeBtns.forEach(button => {
  button.onclick = () => {
    modeBtns.forEach(item => item.classList.remove("active"));
    button.classList.add("active");
    currentMode = button.dataset.mode;
    selectedAtk = null;
    selectedDef = [];
    document.querySelectorAll(".filter-btn").forEach(item => item.classList.remove("active"));
    showCenter([]);
    clearArrows();
  };
});

function renderCircle() {
  const size = 460;
  const radius = size * 0.4;
  const centerX = size / 2;
  const centerY = size / 2;
  const total = elements.length;

  document.querySelectorAll(".circle-item").forEach(item => item.remove());
  circleWrap.style.width = `${size}px`;
  circleWrap.style.height = `${size}px`;

  elements.forEach((element, index) => {
    const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
    const x = centerX + radius * Math.cos(angle);
    const y = centerY + radius * Math.sin(angle);

    const div = document.createElement("div");
    div.className = "circle-item";
    div.style.left = `${x}px`;
    div.style.top = `${y}px`;
    div.innerHTML = `<img src="public/icons/${element}.png" alt="${element}" style="width:100%;height:100%;object-fit:contain">`;
    circleWrap.appendChild(div);
  });
}

function showCenter(selectedElements) {
  centerElem.innerHTML = "";
  if (!selectedElements || selectedElements.length === 0) return;

  if (selectedElements.length === 1) {
    const image = document.createElement("img");
    image.className = "center-img";
    image.src = `public/icons/${selectedElements[0]}.png`;
    image.alt = selectedElements[0];
    centerElem.appendChild(image);
    return;
  }

  if (selectedElements.length === 2) {
    centerElem.innerHTML = `
      <div style="width:100%;height:100%;display:flex;">
        <img src="public/icons/${selectedElements[0]}.png" alt="${selectedElements[0]}" style="width:50%;height:100%;object-fit:cover;object-position:left;">
        <img src="public/icons/${selectedElements[1]}.png" alt="${selectedElements[1]}" style="width:50%;height:100%;object-fit:cover;object-position:right;">
      </div>
    `;
  }
}

function drawAtkArrows(element) {
  clearArrows();
  if (!element) return;
  const data = weaknessTable[element];
  data["very-effective"].forEach(target => drawArrowAtk(true, target));
  data["not-effective"].forEach(target => drawArrowAtk(false, target));
}

function drawDefArrows(selectedElements) {
  clearArrows();
  if (!selectedElements || selectedElements.length === 0) return;

  elements.forEach(source => {
    const chart = weaknessTable[source];
    const hitsStrong = selectedElements.some(target => chart["very-effective"].includes(target));
    const hitsResist = selectedElements.some(target => chart["not-effective"].includes(target));

    if (hitsStrong) {
      drawArrowDef(true, source);
    } else if (hitsResist) {
      drawArrowDef(false, source);
    }
  });
}

function drawArrowAtk(isStrong, targetElement) {
  const from = { x: 230, y: 230 };
  const targetNode = [...document.querySelectorAll(".circle-item")].find(node => {
    const img = node.querySelector("img");
    return img && img.alt === targetElement;
  });
  if (!targetNode) return;

  const rect = targetNode.getBoundingClientRect();
  const wrapRect = circleWrap.getBoundingClientRect();
  const to = {
    x: rect.left - wrapRect.left + rect.width / 2,
    y: rect.top - wrapRect.top + rect.height / 2
  };
  drawArrow(from, to, isStrong ? "very-effective" : "not-effective");
}

function drawArrowDef(isStrong, sourceElement) {
  const fromNode = [...document.querySelectorAll(".circle-item")].find(node => {
    const img = node.querySelector("img");
    return img && img.alt === sourceElement;
  });
  if (!fromNode) return;

  const fromRect = fromNode.getBoundingClientRect();
  const wrapRect = circleWrap.getBoundingClientRect();
  const from = {
    x: fromRect.left - wrapRect.left + fromRect.width / 2,
    y: fromRect.top - wrapRect.top + fromRect.height / 2
  };
  const to = { x: 230, y: 230 };
  drawArrow(from, to, isStrong ? "very-effective" : "not-effective");
}

function drawArrow(from, to, type) {
  const dx = to.x - from.x;
  const dy = to.y - from.y;
  const length = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;

  const arrow = document.createElement("div");
  arrow.className = `arrow ${type}`;
  arrow.style.left = `${from.x}px`;
  arrow.style.top = `${from.y}px`;
  arrow.style.height = `${length}px`;
  arrow.style.transformOrigin = "top center";
  arrow.style.transform = `rotate(${angle}deg)`;

  const head = document.createElement("div");
  head.className = `arrow-head ${type}`;
  arrow.appendChild(head);

  circleWrap.appendChild(arrow);
}

function clearArrows() {
  document.querySelectorAll(".arrow").forEach(item => item.remove());
}

renderCircle();
</script>

</html>
